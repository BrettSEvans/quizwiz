version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quizwiz
      POSTGRES_PASSWORD: quizwiz
      POSTGRES_DB: quizwiz
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-test-db.sql:/docker-entrypoint-initdb.d/01-init-test-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quizwiz"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
